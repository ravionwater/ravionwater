<!DOCTYPE html>
<html>
<head>

<title>Contact Us | Ravion Water</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="logo.png">
<link rel="shortcut icon" href="favicon.ico">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* RESET */
body {
    margin: 0;
    font-family: 'Segoe UI', Arial;
    background: #f8f9fb;
}

/* HEADER */
.navbar {
    background: white;
    border-bottom: 1px solid #ddd;
}

.container {
    max-width: 1200px;
    margin: auto;
    display: flex;
    align-items: center;
    padding: 15px 20px;
    justify-content: space-between;
}

.logo img {
    height: 60px;
}

/* MENU */
.nav-links {
    display: flex;
    gap: 30px;
}

.nav-links a {
    color: #0b3d91;
    text-decoration: none;
    font-weight: 600;
}

/* HERO */
.contact-hero {
    display: flex;
}

.hero-left {
    flex: 1;
    background: #0b3d91;
    color: white;
    padding: 40px;
}

.hero-left h2 {
    font-size: 30px;
}

.hero-right {
    flex: 1;
}

.hero-right img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* CONTACT INFO */
.contact-info {
    display: flex;
    gap: 40px;
    padding: 40px 6%;
}

.info-left {
    flex: 1;
}

.info-left h3 {
    color: #0b3d91;
}

.info-left p {
    margin: 15px 0;
}

.info-left i {
    color: #0b3d91;
    margin-right: 10px;
}

/* MAP */
.info-right {
    flex: 1;
}

.info-right iframe {
    width: 100%;
    height: 320px;
    border: none;
}

/* FORM */
.contact-form {
    padding: 40px 6%;
}

.contact-form h3 {
    margin-bottom: 20px;
    color: #0b3d91;
}

.contact-form form {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 15px;
}

.contact-form input,
.contact-form textarea {
    padding: 10px;
    border: 1px solid #ddd;
}

.contact-form textarea {
    grid-column: span 2;
    height: 100px;
}

.contact-form button {
    grid-column: span 2;
    background: #0b3d91;
    color: white;
    padding: 12px;
    border: none;
    cursor: pointer;
}

/* MOBILE */
@media(max-width:768px) {
    .contact-hero,
    .contact-info {
        flex-direction: column;
    }

    .contact-form form {
        grid-template-columns: 1fr;
    }

    .contact-form textarea,
    .contact-form button {
        grid-column: span 1;
    }
}

</style>

</head>

<body>

<!-- HEADER -->
<header class="navbar">
<div class="container">
<div class="logo">
<img src="logo.png">
</div>

<nav class="nav-links">

</nav>
</div>
</header>

<!-- HERO -->
<div class="contact-hero">

<div class="hero-left">
<h2>Contact Us</h2>
<p>Let’s discuss your water system requirements</p>
</div>

<div class="hero-right">
<img src="contact.png">
</div>

</div>

<!-- CONTACT + MAP -->
<div class="contact-info">

<div class="info-left">
<h3>Ravion Water</h3>

<p><i class="fa-solid fa-location-dot"></i>
Plot No. 189, IDA Jeedimetla, Hyderabad, Telangana</p>

<p><i class="fa-solid fa-envelope"></i>
info@ravionwater.in</p>

<p><i class="fa-solid fa-phone"></i>
+91 99854 79095</p>

</div>

<div class="info-right">
<iframe src="<iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3804.509933351672!2d78.45478947369313!3d17.53089219865815!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bcb8fcc3b7b8933%3A0x684646739770bdce!2sRAVION%20WATER%20TECH!5e0!3m2!1sen!2sin!4v1782371906190!5m2!1sen!2sin" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="strict-origin-when-cross-origin"</iframe>
</div>

</div>

<!-- FORM -->
<div class="contact-form">

<h3>Send Enquiry</h3>

<form>
<input type="text" placeholder="Name" required>
<input type="email" placeholder="Email" required>
<input type="text" placeholder="Mobile">
<input type="text" placeholder="Company">
<textarea placeholder="Message"></textarea>
<button type="submit">Send Request</button>
</form>

</div>

</body>
</html>
